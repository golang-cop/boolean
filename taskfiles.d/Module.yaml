version: "3"

tasks:
  init:
    desc: Initialize the Go module
    cmds:
    - |
    
      go mod init github.com/golang-oop/boolean

  requirements:
    desc: Add module requirements and sums
    cmds:
    - |
    
      go clean -modcache -cache
      go get github.com/golang-oop/string
      go get github.com/golang-oop/result
      go mod tidy
